<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Simple Interest Calculator</title>
    <!-- Task 1: Explicit Favicon Definition -->
    <link rel="icon" href="favicon.ico" type="image/x-icon">
    <!-- Task 2: Fixed Missing CSS Reference -->
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="main-container">
        <h1>Simple Interest Calculator</h1>

        <div class="form-group">
            <label for="principal">Principal Amount</label>
            <input type="number" id="principal" min="1" placeholder="Enter principal amount">
        </div>

        <div class="form-group">
            <label for="rate">Interest Rate (%)</label>
            <!-- A range slider to dynamically select interest rate values -->
            <input type="range" id="rate" min="1" max="20" step="0.25" value="10.25" oninput="updateRateView(this.value)">
            <span id="rate_val">10.25%</span>
        </div>

        <div class="form-group">
            <label for="years">No. of Years</label>
            <select id="years">
                <option value="1">1</option>
                <option value="2">2</option>
                <option value="3">3</option>
                <option value="4">4</option>
                <option value="5">5</option>
                <option value="6">6</option>
                <option value="7">7</option>
                <option value="8">8</option>
                <option value="9">9</option>
                <option value="10">10</option>
            </select>
        </div>

        <button onclick="computeInterest()">Compute Interest</button>

        <!-- Container where computed results will dynamically change -->
        <div id="result-container">
            <span id="result"></span>
        </div>
    </div>

    <!-- Script file linked at the bottom for performance -->
    <script src="script.js"></script>
</body>
</html>
